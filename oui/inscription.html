<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Le Goupix</h1>
        <nav>
            <a href="#">Accueil</a>
            <a href="#">À propos</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <div class="kangourou">
        <h2>Créer un compte</h2>

        <div class="loup">
            <form action="#" method="post">

                <div class="bison">
                    <div class="lynx">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" placeholder="Jean" required>
                    </div>
                    <div class="lynx">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" placeholder="Dupont" required>
                    </div>
                </div>

                <div class="lynx">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" name="email" placeholder="jean.dupont@email.com" required>
                </div>

                <div class="lynx">
                    <label for="date_naissance">Date de naissance</label>
                    <input type="date" id="date_naissance" name="date_naissance" required>
                </div>

                <hr class="vautour">

                <div class="lynx">
                    <label for="mot_de_passe">Mot de passe</label>
                    <input type="password" id="mot_de_passe" name="mot_de_passe" placeholder="••••••••" required>
                </div>

                <div class="lynx">
                    <label for="confirmation_mdp">Confirmer le mot de passe</label>
                    <input type="password" id="confirmation_mdp" name="confirmation_mdp" placeholder="••••••••" required>
                </div>

                <hr class="vautour">

                <div class="frelon">
                    <input type="checkbox" id="cgv" name="cgv" required>
                    <label for="cgv">J'accepte les <a href="#">conditions générales d'utilisation</a></label>
                </div>

                <button type="submit" class="iguane">S'inscrire</button>

            </form>
        </div>

        <div class="manchot">
            Déjà un compte ? <a href="#">Se connecter</a>
        </div>

    </div>

</body>
</html>
