<!DOCTYPE html> 
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title> Le Goupix - Connexion</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="connexion">
		<h1>Le Goupix 🌮</h1>
		<p class="subtitle">Connexion à votre espace</p>
		
		<form class="login">
			<label for="email">Adresse e-mail</label>
			<input type="email" id="email" placeholder="jeanbon@gmail.com" required>
			
			<label for="password">Mot de passe</label>
			<input type="passeword" id="passeword" placeholder="*********" required>
			
			<button type="submit">Se connecter</button>
		</form>
		
		<p class="creer">Pas encore de compte? <a href="#">Créer un compte</a></p>
	</div>
</body>
</html>
