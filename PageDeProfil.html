<!DOCTYPE html> 
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title>Le Goupix - Profil</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<header>
		<h1>Le Goupix 🌮</h1>
		<p>Page de profil</p>
	</header>

	<h1>Mon Profil</h1>

	<section>
		<h2>Informations personnelles</h2>
		<div class="info">
			<label>Nom :</label>
			<input type="text" value="Bon">
		</div>
		<div class="info">
			<label>Prénom :</label>
			<input type="text" value="Jean">
		</div>
		<div class="info">
			<label>Email :</label>
			<input type="email" value="jeanbon@gmail.com">
		</div>
	</section>
	
	<section>
		<h2>Mes Commandes</h2>
		<table>
			<tr>
				<th>Numéro</th>
				<th>Date</th>
				<th>Montant</th>
				<th>Statut</th>
			</tr>
			<tr>
				<td>#150</td>
				<td>12/02/2025</td>
				<td>35.50€</td>
				<td>Livrée</td>
			</tr>
			<tr>
				<td>#151</td>
				<td>20/02/2025</td>
				<td>45.50€</td>
				<td>En cours</td>
			</tr>
		</table>  
	</section>

	<section>>
		<h2>Compte Fidélité</h2>
		<p>Points actuels : <strong>220 pts</strong></p>
		<div class="barre-de-progression">
			<div class="progression"></div>
		</div>
		<p>Prochaine récompense : -5€ à 250 pts</p>
	</section>

	<footer>
		<p>2026 - Le Goupix</p>
	</footer>

</body>
</html>
